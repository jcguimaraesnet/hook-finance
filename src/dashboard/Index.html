<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hook-finance</title>
  <?!= include_('dashboard/Stylesheet') ?>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>
  <div id="loading"><p>Carregando…</p></div>

  <div id="login" hidden>
    <div class="login-card">
      <h2>hook-finance</h2>
      <label for="token-input">Token</label>
      <input id="token-input" type="password" autocomplete="off" />
      <button id="token-submit" type="button">Entrar</button>
      <p id="login-error" class="error" hidden></p>
    </div>
  </div>

  <div id="dashboard" hidden>
    <header>
      <div class="filter-stack">
        <div class="filter-group">
          <label for="filter-data">Data</label>
          <select id="filter-data"></select>
        </div>
        <div class="kpi"><span>Total geral</span><strong id="kpi-total-geral">—</strong></div>
      </div>
      <div class="kpi"><span>Total cartão</span><strong id="kpi-total-cartao">—</strong></div>
      <div class="kpi"><span>Total parcelado</span><strong id="kpi-total-parcelado">—</strong></div>
    </header>

    <section class="people">
      <div class="card person" data-person="Julio">
        <h3>Júlio</h3>
        <div class="scroll-x">
          <table class="origem-breakdown" id="table-julio"></table>
        </div>
        <div class="person-kpis" id="kpis-julio"></div>
      </div>
      <div class="card person" data-person="Dani">
        <h3>Dani</h3>
        <div class="scroll-x">
          <table class="origem-breakdown" id="table-dani"></table>
        </div>
        <div class="person-kpis" id="kpis-dani"></div>
      </div>
    </section>

    <section class="lower">
      <div class="card">
        <h3>Cartão (por categoria)</h3>
        <div class="scroll-x">
          <table id="categoria-table"></table>
        </div>
      </div>
      <div class="card">
        <h3>Cartão (por pessoa)</h3>
        <div class="chart-wrap"><canvas id="chart-rateio"></canvas></div>
      </div>
    </section>

    <section class="card history">
      <h3>Histórico — Total geral</h3>
      <div class="chart-wrap"><canvas id="chart-historico-total"></canvas></div>
    </section>

    <section class="card history">
      <h3>Histórico — Pessoal</h3>
      <div class="chart-wrap"><canvas id="chart-historico-pessoal"></canvas></div>
    </section>
  </div>

  <?!= include_('dashboard/Script') ?>
</body>
</html>
