<script>
  const Money = new Intl.NumberFormat("pt-BR", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });
  const Pct = new Intl.NumberFormat("pt-BR", {
    style: "percent",
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });

  const TOKEN_KEY = "hook-finance-token";
  const TAB_KEY = "hook-finance-tab";
  const PAGE_KEY = "hook-finance-page";
  const VALID_TABS = ["mes", "categoria", "pessoal", "historico"];
  const VALID_PAGES = ["consulta", "detalhe", "lancamento", "acerto"];
  let allMonths = [];
  let acertoMonth = null;
  const MONTH_NAMES_PT = [
    "janeiro", "fevereiro", "março", "abril", "maio", "junho",
    "julho", "agosto", "setembro", "outubro", "novembro", "dezembro",
  ];
  let lastEntries = [];
  let editingEntry = null;
  let editOriginalTotal = 0;
  const charts = {};
  const monthCache = Object.create(null);
  let currentMonth = null;
  let currentMonthRows = [];
  let activeTab = "mes";
  let activePage = "consulta";

  const TILE_IDS = ["kpi-total-geral", "kpi-total-cartao", "kpi-total-parcelado"];
  const TABLE_SKELETONS = [
    "skeleton-table-julio",
    "skeleton-table-dani",
    "skeleton-table-categoria",
  ];
  const RATEIO_SKELETON = "skeleton-chart-rateio";
  const HISTORICO_TOTAL_SKELETON = "skeleton-chart-historico-total";
  const HISTORICO_PESSOAL_SKELETON = "skeleton-chart-historico-pessoal";

  function $(id) {
    return document.getElementById(id);
  }

  function showLogin(error) {
    $("login").hidden = false;
    $("dashboard").hidden = true;
    if (error) {
      $("login-error").textContent = error;
      $("login-error").hidden = false;
    } else {
      $("login-error").hidden = true;
    }
  }

  function showDashboard() {
    $("login").hidden = true;
    $("dashboard").hidden = false;
  }

  function isPCWeb_() {
    return window.matchMedia("(min-width: 750px)").matches;
  }

  function setActivePage(page) {
    if (!VALID_PAGES.includes(page)) page = "consulta";
    activePage = page;
    try { localStorage.setItem(PAGE_KEY, page); } catch (_) {}
    for (const btn of document.querySelectorAll(".nav-item")) {
      const btnPage = btn.dataset.page;
      if (!btnPage) continue;
      btn.classList.toggle("active", btnPage === page);
    }
    for (const pageEl of document.querySelectorAll(".page")) {
      pageEl.hidden = pageEl.id !== "page-" + page;
    }
    if (page === "lancamento") loadLancamentos();
    if (page === "acerto") loadAcerto();
  }

  function setupPageNav() {
    for (const btn of document.querySelectorAll(".nav-item")) {
      if (btn.disabled) continue;
      const page = btn.dataset.page;
      if (!page) continue;
      btn.addEventListener("click", () => setActivePage(page));
    }
  }

  function syncFilterSelectors_() {
    for (const id of ["filter-data", "filter-data-detalhe"]) {
      const sel = $(id);
      if (sel && currentMonth && sel.value !== currentMonth) {
        sel.value = currentMonth;
      }
    }
  }

  function setupDiffToggles() {
    for (const btn of document.querySelectorAll(".diff-toggle")) {
      btn.addEventListener("click", () => toggleDiff(btn.dataset.person));
    }
    for (const person of ["Julio", "Dani"]) {
      const key = "hook-finance-diff-" + person.toLowerCase();
      let saved = "0";
      try { saved = localStorage.getItem(key) || "0"; } catch (_) {}
      if (saved === "1") applyDiffVisibility_(person, true);
    }
  }

  function toggleDiff(person) {
    const diffEl = $("diff-" + person.toLowerCase());
    if (!diffEl) return;
    const becomeVisible = diffEl.hidden;
    applyDiffVisibility_(person, becomeVisible);
    try {
      localStorage.setItem(
        "hook-finance-diff-" + person.toLowerCase(),
        becomeVisible ? "1" : "0",
      );
    } catch (_) {}
  }

  function applyDiffVisibility_(person, visible) {
    const diffEl = $("diff-" + person.toLowerCase());
    const btn = document.querySelector(
      '.diff-toggle[data-person="' + person + '"]',
    );
    if (diffEl) diffEl.hidden = !visible;
    if (btn) btn.classList.toggle("active", visible);
  }

  function setActiveTab(tab) {
    if (!VALID_TABS.includes(tab)) tab = "mes";
    activeTab = tab;
    try { localStorage.setItem(TAB_KEY, tab); } catch (_) {}
    const buttons = document.querySelectorAll(".tab-btn");
    for (const btn of buttons) {
      const isActive = btn.dataset.tab === tab;
      btn.classList.toggle("active", isActive);
      btn.setAttribute("aria-selected", isActive ? "true" : "false");
    }
    const panels = document.querySelectorAll(".tab-panel");
    if (isPCWeb_()) {
      for (const panel of panels) panel.hidden = false;
    } else {
      for (const panel of panels) {
        panel.hidden = panel.id !== "tab-" + tab;
      }
    }
    flushPendingCharts(tab);
  }

  const chartPending = {
    rateio: null,
    historicoTotal: null,
    historicoPessoal: null,
  };

  function flushPendingCharts(tab) {
    if (tab === "pessoal" && chartPending.rateio !== null) {
      const rows = chartPending.rateio;
      chartPending.rateio = null;
      revealRateioCanvas_();
      renderRateioChart(rows);
    }
    if (tab === "historico") {
      if (chartPending.historicoTotal !== null) {
        const p = chartPending.historicoTotal;
        chartPending.historicoTotal = null;
        revealHistoricoCanvases_();
        const sliced = sliceHistoryForViewport_(p.months, p.series);
        drawLineChart_("chart-historico-total", "historicoTotal", sliced.months, sliced.series);
      }
      if (chartPending.historicoPessoal !== null) {
        const p = chartPending.historicoPessoal;
        chartPending.historicoPessoal = null;
        revealHistoricoCanvases_();
        const sliced = sliceHistoryForViewport_(p.months, p.series);
        drawLineChart_("chart-historico-pessoal", "historicoPessoal", sliced.months, sliced.series);
      }
    }
  }

  function revealRateioCanvas_() {
    const c = $("chart-rateio");
    if (c) c.hidden = false;
    const sk = $(RATEIO_SKELETON);
    if (sk) sk.hidden = true;
  }

  function revealHistoricoCanvases_() {
    for (const id of [HISTORICO_TOTAL_SKELETON, HISTORICO_PESSOAL_SKELETON]) {
      const el = $(id);
      if (el) el.hidden = true;
    }
    for (const cid of ["chart-historico-total", "chart-historico-pessoal"]) {
      const c = $(cid);
      if (c) c.hidden = false;
    }
  }

  function init() {
    $("token-submit").addEventListener("click", () => {
      const v = $("token-input").value.trim();
      if (!v) return;
      localStorage.setItem(TOKEN_KEY, v);
      startDashboard(v);
    });
    $("token-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") $("token-submit").click();
    });
    $("filter-data").addEventListener("change", (e) => {
      onMonthChange(e.target.value);
    });
    const detalheSel = $("filter-data-detalhe");
    if (detalheSel) {
      detalheSel.addEventListener("change", (e) => onMonthChange(e.target.value));
    }
    const acertoSel = $("filter-data-acerto");
    if (acertoSel) {
      acertoSel.addEventListener("change", (e) => onAcertoMonthChange(e.target.value));
    }
    for (const btn of document.querySelectorAll(".tab-btn")) {
      btn.addEventListener("click", () => setActiveTab(btn.dataset.tab));
    }
    setupPageNav();
    setupDiffToggles();
    setupEditModal();
    let saved = "mes";
    try { saved = localStorage.getItem(TAB_KEY) || "mes"; } catch (_) {}
    setActiveTab(saved);
    let savedPage = "consulta";
    try { savedPage = localStorage.getItem(PAGE_KEY) || "consulta"; } catch (_) {}
    setActivePage(savedPage);

    const stored = localStorage.getItem(TOKEN_KEY);
    if (stored) startDashboard(stored);
    else showLogin();
  }

  function startDashboard(token) {
    showDashboard();
    showCurrentMonthSkeleton();
    showHistoricoSkeleton();
    loadCurrentMonth(token);
  }

  function loadCurrentMonth(token, requestedMonth) {
    google.script.run
      .withSuccessHandler((res) => {
        if (!res || !res.ok) {
          if (res && res.error === "unauthorized") {
            localStorage.removeItem(TOKEN_KEY);
            showLogin("Token inválido");
          } else {
            showLogin("Erro: " + (res && res.error));
          }
          return;
        }
        currentMonth = res.month;
        currentMonthRows = res.rows || [];
        if (res.month) monthCache[res.month] = currentMonthRows;
        renderCurrentMonth(currentMonth, currentMonthRows);
        if (!requestedMonth) {
          // Primeira carga: passo 3 só dispara aqui.
          seedSelector(currentMonth);
          loadHistorical(token);
        }
      })
      .withFailureHandler((err) => {
        showLogin("Falha: " + (err && err.message ? err.message : err));
      })
      .getMonthData(token, requestedMonth || null);
  }

  function loadHistorical(token) {
    google.script.run
      .withSuccessHandler((res) => {
        if (!res || !res.ok) {
          showHistoricalError(res && res.error);
          return;
        }
        renderHistoricoFromSummary(res.history);
        expandSelector(res.months);
      })
      .withFailureHandler((err) => {
        showHistoricalError(err && err.message ? err.message : String(err));
      })
      .getHistoricalSummary(token);
  }

  function onMonthChange(novoMes) {
    if (!novoMes || novoMes === currentMonth) return;
    if (monthCache[novoMes]) {
      currentMonth = novoMes;
      currentMonthRows = monthCache[novoMes];
      renderCurrentMonth(currentMonth, currentMonthRows);
      return;
    }
    showCurrentMonthSkeleton();
    loadCurrentMonth(localStorage.getItem(TOKEN_KEY), novoMes);
  }

  function seedSelector(mes) {
    const html = mes
      ? '<option value="' + mes + '">' + mes + "</option>"
      : "<option>—</option>";
    for (const id of ["filter-data", "filter-data-detalhe"]) {
      const sel = $(id);
      if (!sel) continue;
      sel.innerHTML = html;
      sel.value = mes || "";
      sel.disabled = true;
    }
  }

  function expandSelector(meses) {
    const lista = (meses && meses.length ? meses : [currentMonth]).filter(Boolean);
    allMonths = lista.slice();
    const html = lista
      .map((d) => '<option value="' + d + '">' + d + "</option>")
      .join("");
    for (const id of ["filter-data", "filter-data-detalhe"]) {
      const sel = $(id);
      if (!sel) continue;
      sel.innerHTML = html;
      sel.value = currentMonth || lista[0] || "";
      sel.disabled = false;
    }
    const acertoSel = $("filter-data-acerto");
    if (acertoSel) {
      acertoSel.innerHTML = html;
      if (!acertoMonth) acertoMonth = lista[1] || lista[0] || null;
      acertoSel.value = acertoMonth || lista[0] || "";
      acertoSel.disabled = false;
      if (activePage === "acerto") loadAcerto();
    }
  }

  function renderCurrentMonth(mes, rows) {
    clearCurrentMonthSkeleton();
    renderTotals(rows);
    renderPerson("Julio", rows);
    renderPerson("Dani", rows);
    renderCategoria(rows);
    if (isPCWeb_() || activeTab === "pessoal") {
      revealRateioCanvas_();
      renderRateioChart(rows);
      chartPending.rateio = null;
    } else {
      chartPending.rateio = rows;
    }
    renderDetalhe(rows);
    syncFilterSelectors_();
  }

  function renderDetalhe(rows) {
    const list = $("detalhe-list");
    if (!list) return;
    const byPerson = {};
    for (const r of rows) {
      if (r.categoria !== "Pessoal") continue;
      if (!r.rateio || r.rateio === "Metade") continue;
      if (!byPerson[r.rateio]) byPerson[r.rateio] = { total: 0, items: [] };
      byPerson[r.rateio].total += r.valor;
      byPerson[r.rateio].items.push(r);
    }
    const preferred = ["Julio", "Dani", "Alzira"];
    const others = Object.keys(byPerson)
      .filter((p) => !preferred.includes(p))
      .sort();
    const ordered = preferred.concat(others);

    let html = "";
    for (const person of ordered) {
      const data = byPerson[person];
      if (!data) continue;
      data.items.sort((a, b) => String(b.dataRef).localeCompare(String(a.dataRef)));
      html += '<details class="person-accordion" data-person="' + person + '">';
      html += '<summary class="person-summary">';
      html += '<span class="person-name">' + escapeHtml_(person) + "</span>";
      html += '<span class="person-total">R$ ' + Money.format(data.total) + "</span>";
      html += "</summary>";
      html += '<div class="person-details"><div class="scroll-x"><table>';
      html +=
        '<thead><tr><th>Data</th><th>Descrição</th><th class="num">Valor (R$)</th></tr></thead><tbody>';
      for (const item of data.items) {
        html +=
          "<tr><td>" +
          escapeHtml_(item.dataRef) +
          "</td><td>" +
          escapeHtml_(item.descricao) +
          '</td><td class="num">' +
          Money.format(item.valor) +
          "</td></tr>";
      }
      html += "</tbody></table></div></div>";
      html += "</details>";
    }
    list.innerHTML =
      html ||
      '<p class="detalhe-empty">Sem despesas pessoais neste mês.</p>';
  }

  function escapeHtml_(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function loadLancamentos() {
    const list = $("lancamento-list");
    if (list) {
      list.innerHTML =
        '<div class="skeleton skeleton-bar lg" style="height:3rem;margin-bottom:0.5rem"></div>' +
        '<div class="skeleton skeleton-bar lg" style="height:3rem;margin-bottom:0.5rem"></div>' +
        '<div class="skeleton skeleton-bar lg" style="height:3rem"></div>';
    }
    updateLancamentoSubtitle_();
    updateCategoriaOptions_();
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) return;
    google.script.run
      .withSuccessHandler((res) => {
        if (!res || !res.ok) {
          if (list) list.innerHTML =
            '<p class="lancamento-empty">Erro: ' + escapeHtml_(res && res.error) + '</p>';
          return;
        }
        lastEntries = res.entries || [];
        renderLancamentos();
      })
      .withFailureHandler((err) => {
        if (list) list.innerHTML =
          '<p class="lancamento-empty">Falha: ' + escapeHtml_(err && err.message) + '</p>';
      })
      .getLastEntries(token, 10);
  }

  function updateLancamentoSubtitle_() {
    const el = $("lancamento-mes-label");
    if (!el) return;
    if (!currentMonth) { el.textContent = "—"; return; }
    const parts = currentMonth.split("/");
    if (parts.length !== 3) { el.textContent = currentMonth; return; }
    const m = parseInt(parts[1], 10);
    const y = parts[2];
    const monthName = MONTH_NAMES_PT[m - 1] || ("mês " + m);
    el.textContent = monthName + " de " + y;
  }

  function updateCategoriaOptions_() {
    const dl = $("categoria-options");
    if (!dl) return;
    const set = new Set();
    for (const r of currentMonthRows) {
      if (r.categoria) set.add(r.categoria);
    }
    for (const e of lastEntries) {
      if (e.categoria) set.add(e.categoria);
    }
    const sorted = Array.from(set).sort();
    dl.innerHTML = sorted
      .map((c) => '<option value="' + escapeHtml_(c) + '"></option>')
      .join("");
  }

  function renderLancamentos() {
    const list = $("lancamento-list");
    if (!list) return;
    if (!lastEntries.length) {
      list.innerHTML = '<p class="lancamento-empty">Sem lançamentos.</p>';
      return;
    }
    let html = "";
    for (const e of lastEntries) {
      const parcelaTag = e.parcela > 1
        ? '<span class="lc-tag lc-parcela">' + e.parcela + 'x</span>'
        : '';
      html +=
        '<div class="lancamento-item" data-row="' + e.row + '">' +
        '<div class="lc-meta">' + escapeHtml_(e.dataRef) + ' · ' + escapeHtml_(e.origem) + '</div>' +
        '<div class="lc-desc">' + escapeHtml_(e.descricao) + '</div>' +
        '<div class="lc-valor">R$ ' + Money.format(e.valor) + '</div>' +
        '<div class="lc-tags">' +
        (e.categoria ? '<span class="lc-tag">' + escapeHtml_(e.categoria) + '</span>' : '') +
        (e.rateio ? '<span class="lc-tag">' + escapeHtml_(e.rateio) + '</span>' : '') +
        parcelaTag +
        '</div>' +
        '</div>';
    }
    list.innerHTML = html;
    for (const item of list.querySelectorAll(".lancamento-item")) {
      item.addEventListener("click", () => openEditModal(parseInt(item.dataset.row, 10)));
    }
  }

  function openEditModal(row) {
    const entry = lastEntries.find((e) => e.row === row);
    if (!entry) return;
    editingEntry = entry;
    editOriginalTotal = (Number(entry.valor) || 0) * (Number(entry.parcela) || 1);
    $("edit-dataref").textContent = entry.dataRef || "—";
    $("edit-origem").textContent = entry.origem || "—";
    $("edit-descricao").value = entry.descricao || "";
    $("edit-valor").value = (Number(entry.valor) || 0).toFixed(2);
    $("edit-categoria").value = entry.categoria || "";
    $("edit-rateio").value = entry.rateio || "";
    setParcelaDisplay_(entry.parcela || 1);
    $("edit-error").hidden = true;
    $("edit-modal").hidden = false;
    document.body.style.overflow = "hidden";
  }

  function closeEditModal() {
    $("edit-modal").hidden = true;
    document.body.style.overflow = "";
    editingEntry = null;
  }

  function getCurrentParcela_() {
    const txt = $("edit-parcela-value").textContent || "1x";
    return parseInt(txt, 10) || 1;
  }

  function setParcelaDisplay_(n) {
    const safe = Math.max(1, Math.min(99, parseInt(n, 10) || 1));
    $("edit-parcela-value").textContent = safe + "x";
    const valorPerParcela = editOriginalTotal / safe;
    $("edit-valor").value = valorPerParcela.toFixed(2);
    $("edit-parcela-total").textContent = "R$ " + Money.format(editOriginalTotal);
  }

  function setupEditModal() {
    $("edit-modal-close").addEventListener("click", closeEditModal);
    $("edit-cancel").addEventListener("click", closeEditModal);
    $("edit-parcela-up").addEventListener("click", () => {
      setParcelaDisplay_(getCurrentParcela_() + 1);
    });
    $("edit-parcela-down").addEventListener("click", () => {
      setParcelaDisplay_(getCurrentParcela_() - 1);
    });
    $("edit-valor").addEventListener("input", (e) => {
      const v = parseFloat(e.target.value) || 0;
      const parcela = getCurrentParcela_();
      editOriginalTotal = v * parcela;
      $("edit-parcela-total").textContent = "R$ " + Money.format(editOriginalTotal);
    });
    $("edit-form").addEventListener("submit", (e) => {
      e.preventDefault();
      saveEntry();
    });
    $("edit-delete").addEventListener("click", () => {
      if (!editingEntry) return;
      if (!window.confirm("Excluir este lançamento? Esta ação não pode ser desfeita.")) return;
      deleteEntry();
    });
  }

  function saveEntry() {
    if (!editingEntry) return;
    const fields = {
      descricao: $("edit-descricao").value.trim(),
      valor: parseFloat($("edit-valor").value) || 0,
      categoria: $("edit-categoria").value.trim(),
      rateio: $("edit-rateio").value,
      parcela: getCurrentParcela_(),
    };
    const errEl = $("edit-error");
    errEl.hidden = true;
    const saveBtn = $("edit-save");
    const deleteBtn = $("edit-delete");
    saveBtn.disabled = true;
    deleteBtn.disabled = true;
    saveBtn.textContent = "Salvando...";
    google.script.run
      .withSuccessHandler((res) => {
        saveBtn.disabled = false;
        deleteBtn.disabled = false;
        saveBtn.textContent = "Salvar";
        if (!res || !res.ok) {
          errEl.textContent = "Erro: " + ((res && res.error) || "desconhecido");
          errEl.hidden = false;
          return;
        }
        closeEditModal();
        loadLancamentos();
      })
      .withFailureHandler((err) => {
        saveBtn.disabled = false;
        deleteBtn.disabled = false;
        saveBtn.textContent = "Salvar";
        errEl.textContent = "Falha: " + (err && err.message ? err.message : err);
        errEl.hidden = false;
      })
      .updateEntry(localStorage.getItem(TOKEN_KEY), editingEntry.row, fields);
  }

  function deleteEntry() {
    if (!editingEntry) return;
    const errEl = $("edit-error");
    errEl.hidden = true;
    const saveBtn = $("edit-save");
    const deleteBtn = $("edit-delete");
    saveBtn.disabled = true;
    deleteBtn.disabled = true;
    deleteBtn.textContent = "Excluindo...";
    google.script.run
      .withSuccessHandler((res) => {
        saveBtn.disabled = false;
        deleteBtn.disabled = false;
        deleteBtn.textContent = "Excluir";
        if (!res || !res.ok) {
          errEl.textContent = "Erro: " + ((res && res.error) || "desconhecido");
          errEl.hidden = false;
          return;
        }
        closeEditModal();
        loadLancamentos();
      })
      .withFailureHandler((err) => {
        saveBtn.disabled = false;
        deleteBtn.disabled = false;
        deleteBtn.textContent = "Excluir";
        errEl.textContent = "Falha: " + (err && err.message ? err.message : err);
        errEl.hidden = false;
      })
      .deleteEntry(localStorage.getItem(TOKEN_KEY), editingEntry.row);
  }

  function onAcertoMonthChange(novo) {
    if (!novo || novo === acertoMonth) return;
    acertoMonth = novo;
    loadAcerto();
  }

  function loadAcerto() {
    if (!acertoMonth && allMonths.length) {
      acertoMonth = allMonths[1] || allMonths[0];
    }
    if (!acertoMonth) return;
    const sel = $("filter-data-acerto");
    if (sel && sel.value !== acertoMonth) sel.value = acertoMonth;
    showAcertoSkeleton_();
    if (monthCache[acertoMonth]) {
      renderAcertoCards(monthCache[acertoMonth]);
      return;
    }
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) return;
    google.script.run
      .withSuccessHandler((res) => {
        if (!res || !res.ok) {
          showAcertoError_(res && res.error);
          return;
        }
        monthCache[res.month] = res.rows || [];
        renderAcertoCards(monthCache[res.month]);
      })
      .withFailureHandler((err) => {
        showAcertoError_(err && err.message ? err.message : String(err));
      })
      .getMonthData(token, acertoMonth);
  }

  function showAcertoSkeleton_() {
    const skeleton =
      '<div class="skeleton skeleton-bar lg" style="height:1.4rem;margin-bottom:0.4rem"></div>' +
      '<div class="skeleton skeleton-bar lg" style="height:1.4rem;margin-bottom:0.4rem"></div>' +
      '<div class="skeleton skeleton-bar lg" style="height:1.4rem"></div>';
    const j = $("acerto-julio");
    const d = $("acerto-dani");
    if (j) j.innerHTML = skeleton;
    if (d) d.innerHTML = skeleton;
  }

  function showAcertoError_(msg) {
    const text = '<p class="error" style="padding:0.5rem 0;margin:0">Erro: ' + escapeHtml_(msg || "desconhecido") + "</p>";
    const j = $("acerto-julio");
    const d = $("acerto-dani");
    if (j) j.innerHTML = text;
    if (d) d.innerHTML = text;
  }

  function renderAcertoCards(rows) {
    const j = $("acerto-julio");
    const d = $("acerto-dani");
    if (j) j.innerHTML = renderAcertoCardHtml_(rows, "Julio");
    if (d) d.innerHTML = renderAcertoCardHtml_(rows, "Dani");
  }

  function renderAcertoCardHtml_(rows, person) {
    const cartao = rows.filter((r) => r.origem === "Cartão");
    const cartaoCompart = cartao
      .filter((r) => r.categoria !== "Pessoal")
      .reduce((s, r) => s + splitForPerson(r, person), 0);
    const cartaoPessoal = cartao
      .filter((r) => r.categoria === "Pessoal")
      .reduce((s, r) => s + splitForPerson(r, person), 0);
    const acertoRows = rows.filter(
      (r) => r.acerto === "Sim" && r.rateio === person,
    );

    let total = cartaoCompart + cartaoPessoal;
    for (const r of acertoRows) total += r.valor;

    let html = "<table><tbody>";
    html +=
      '<tr><td>Cartão (compart.)</td><td class="num">' +
      Money.format(cartaoCompart) +
      "</td></tr>";
    html +=
      '<tr><td>Cartão (pessoal)</td><td class="num">' +
      Money.format(cartaoPessoal) +
      "</td></tr>";
    if (acertoRows.length) {
      html += '<tr class="section"><td colspan="2">Acerto</td></tr>';
      for (const r of acertoRows) {
        html +=
          "<tr><td>" +
          escapeHtml_(r.descricao) +
          '</td><td class="num">' +
          Money.format(r.valor) +
          "</td></tr>";
      }
    }
    html +=
      '<tr class="total"><td>Total</td><td class="num">' +
      Money.format(total) +
      "</td></tr></tbody></table>";
    return html;
  }

  function showCurrentMonthSkeleton() {
    for (const id of TILE_IDS) {
      const el = $(id);
      el.classList.add("skeleton", "skeleton-bar", "lg");
      el.textContent = "—";
    }
    for (const id of TABLE_SKELETONS) {
      const el = $(id);
      if (el) el.hidden = false;
    }
    for (const tableId of ["table-julio", "table-dani", "categoria-table"]) {
      const t = $(tableId);
      if (t) t.innerHTML = "";
    }
    const dl = $("detalhe-list");
    if (dl) {
      dl.innerHTML =
        '<div class="skeleton skeleton-bar lg" style="height:3rem;margin-bottom:0.5rem"></div>' +
        '<div class="skeleton skeleton-bar lg" style="height:3rem;margin-bottom:0.5rem"></div>' +
        '<div class="skeleton skeleton-bar lg" style="height:3rem"></div>';
    }
    const c = $("chart-rateio");
    if (c) c.hidden = true;
    const sk = $(RATEIO_SKELETON);
    if (sk) sk.hidden = false;
  }

  function clearCurrentMonthSkeleton() {
    for (const id of TILE_IDS) {
      $(id).classList.remove("skeleton", "skeleton-bar", "lg");
    }
    for (const id of TABLE_SKELETONS) {
      const el = $(id);
      if (el) el.hidden = true;
    }
  }

  function showHistoricoSkeleton() {
    for (const id of [HISTORICO_TOTAL_SKELETON, HISTORICO_PESSOAL_SKELETON]) {
      const el = $(id);
      if (el) el.hidden = false;
    }
    for (const cid of ["chart-historico-total", "chart-historico-pessoal"]) {
      const c = $(cid);
      if (c) c.hidden = true;
    }
    $("error-historico-total").hidden = true;
    $("error-historico-pessoal").hidden = true;
  }

  function showHistoricalError(msg) {
    for (const id of [HISTORICO_TOTAL_SKELETON, HISTORICO_PESSOAL_SKELETON]) {
      const el = $(id);
      if (el) el.hidden = true;
    }
    const text = "Histórico indisponível: " + (msg || "erro desconhecido");
    const e1 = $("error-historico-total");
    const e2 = $("error-historico-pessoal");
    e1.textContent = text;
    e1.hidden = false;
    e2.textContent = text;
    e2.hidden = false;
  }

  function splitForPerson(row, person) {
    if (row.rateio === person) return row.valor;
    if (
      row.rateio === "Metade" &&
      (person === "Julio" || person === "Dani")
    ) {
      return row.valor / 2;
    }
    return 0;
  }

  function renderTotals(rows) {
    const totalGeral = rows.reduce((s, r) => s + r.valor, 0);
    const totalCartao = rows
      .filter((r) => r.origem === "Cartão")
      .reduce((s, r) => s + r.valor, 0);
    $("kpi-total-geral").textContent = Money.format(totalGeral);
    $("kpi-total-cartao").textContent = Money.format(totalCartao);
    // Total parcelado: placeholder (sem coluna de parcelas hoje).
    $("kpi-total-parcelado").textContent = Money.format(0);
  }

  function bucketKey_(row) {
    if (row.origem === "Cartão") {
      return row.categoria === "Pessoal"
        ? "Cartão (pessoal)"
        : "Cartão (compartilhado)";
    }
    return row.origem;
  }

  function renderPerson(person, rows) {
    const byOrigem = {};
    for (const r of rows) {
      const v = splitForPerson(r, person);
      if (v === 0) continue;
      const k = bucketKey_(r);
      byOrigem[k] = (byOrigem[k] || 0) + v;
    }
    const total = Object.values(byOrigem).reduce((s, v) => s + v, 0);

    const ordered = [
      "Cartão (compartilhado)",
      "Cartão (pessoal)",
      "Pix (contas)",
      "Pessoal",
      "Empregados",
    ];
    const seen = new Set(ordered);
    const allKeys = ordered.concat(
      Object.keys(byOrigem).filter((k) => !seen.has(k))
    );

    const tableId = person === "Julio" ? "table-julio" : "table-dani";
    const t = $(tableId);
    let html =
      '<thead><tr><th>Despesas agrupadas</th><th class="num">Valor (R$)</th><th class="num">%</th></tr></thead><tbody>';
    for (const k of allKeys) {
      if (!byOrigem[k]) continue;
      const v = byOrigem[k];
      const pct = total ? v / total : 0;
      html +=
        "<tr><td>" +
        k +
        '</td><td class="num">' +
        Money.format(v) +
        '</td><td class="num">' +
        Pct.format(pct) +
        "</td></tr>";
    }
    html +=
      '<tr class="total"><td>Total Pessoal</td><td class="num">' +
      Money.format(total) +
      '</td><td class="num">' +
      (total ? Pct.format(1) : "—") +
      "</td></tr></tbody>";
    t.innerHTML = html;

    const otherPerson = person === "Julio" ? "Dani" : "Julio";
    const otherByOrigem = {};
    for (const r of rows) {
      const v = splitForPerson(r, otherPerson);
      if (v === 0) continue;
      const k = bucketKey_(r);
      otherByOrigem[k] = (otherByOrigem[k] || 0) + v;
    }
    // Diff: usa Pix se existir no mês; senão cai pra Contas + Empregados.
    const monthHasPix = rows.some((r) => r.origem === "Pix (contas)");
    const meuValor = monthHasPix
      ? byOrigem["Pix (contas)"] || 0
      : (byOrigem["Contas"] || 0) + (byOrigem["Empregados"] || 0);
    const outroValor = monthHasPix
      ? otherByOrigem["Pix (contas)"] || 0
      : (otherByOrigem["Contas"] || 0) + (otherByOrigem["Empregados"] || 0);
    const diff = meuValor - outroValor;

    const diffId = person === "Julio" ? "diff-julio" : "diff-dani";
    const diffEl = $(diffId);
    if (diffEl) {
      const sign = diff >= 0 ? "+" : "−";
      diffEl.textContent =
        "Diff: " + sign + " R$ " + Money.format(Math.abs(diff));
      diffEl.classList.toggle("diff-pos", diff >= 0);
      diffEl.classList.toggle("diff-neg", diff < 0);
    }
  }

  function renderCategoria(rows) {
    const cartao = rows.filter((r) => r.origem === "Cartão");
    const byCat = {};
    for (const r of cartao) {
      const k = r.categoria || "(sem categoria)";
      byCat[k] = (byCat[k] || 0) + r.valor;
    }
    const totalCheio = Object.values(byCat).reduce((s, v) => s + v, 0);
    const list = Object.entries(byCat)
      .map(([cat, cheio]) => ({
        cat: cat,
        cheio: cheio,
        metade: cheio / 2,
        pct: totalCheio ? cheio / totalCheio : 0,
      }))
      .sort((a, b) => b.cheio - a.cheio);

    const t = $("categoria-table");
    let html =
      '<thead><tr><th>Categoria</th><th class="num">Valor (R$)</th><th class="num">Compart. (R$)</th><th class="num">%</th></tr></thead><tbody>';
    for (const r of list) {
      const compartilhado = r.cat === "Pessoal" ? "—" : Money.format(r.metade);
      html +=
        "<tr><td>" +
        r.cat +
        '</td><td class="num">' +
        Money.format(r.cheio) +
        '</td><td class="num">' +
        compartilhado +
        '</td><td class="num">' +
        Pct.format(r.pct) +
        "</td></tr>";
    }
    html +=
      '<tr class="total"><td>Total geral</td><td class="num">' +
      Money.format(totalCheio) +
      '</td><td class="num">—</td><td class="num">' +
      (totalCheio ? Pct.format(1) : "—") +
      "</td></tr></tbody>";
    t.innerHTML = html;
  }

  function renderRateioChart(rows) {
    const cartao = rows.filter((r) => r.origem === "Cartão");
    const byRateio = {};
    for (const r of cartao) {
      const k = r.rateio || "(sem rateio)";
      byRateio[k] = (byRateio[k] || 0) + r.valor;
    }
    const data = Object.entries(byRateio)
      .map(([rateio, valor]) => ({ rateio: rateio, valor: valor }))
      .sort((a, b) => b.valor - a.valor);

    const ctx = $("chart-rateio").getContext("2d");
    if (charts.rateio) charts.rateio.destroy();
    charts.rateio = new Chart(ctx, {
      type: "bar",
      data: {
        labels: data.map((d) => rateioLabel_(d.rateio)),
        datasets: [
          {
            data: data.map((d) => d.valor),
            backgroundColor: "#a07b5e",
            maxBarThickness: 32,
          },
        ],
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => Money.format(ctx.parsed.x),
            },
          },
          datalabels: {
            labels: {
              name: {
                anchor: "start",
                align: "end",
                offset: 8,
                color: "white",
                font: { weight: 600, size: 11 },
                formatter: (v, ctx) => ctx.chart.data.labels[ctx.dataIndex],
              },
              value: {
                anchor: "end",
                align: "start",
                offset: 8,
                color: "white",
                font: { weight: 600, size: 11 },
                formatter: (v) => Money.format(v),
              },
            },
          },
        },
        scales: {
          x: { ticks: { callback: (v) => moneyK_(v) } },
          y: { ticks: { display: false } },
        },
      },
      plugins: [ChartDataLabels],
    });
  }

  function moneyK_(v) {
    if (v == null || isNaN(v)) return "";
    if (Math.abs(v) >= 1000) {
      const k = v / 1000;
      return (k % 1 === 0 ? k.toString() : k.toFixed(1).replace(".", ",")) + "k";
    }
    return v.toLocaleString("pt-BR");
  }

  function rateioLabel_(rateio) {
    if (rateio === "Metade") return "Compartilhado";
    return rateio;
  }

  function renderHistoricoFromSummary(history) {
    const meses = (history && history.months) || [];
    const totals = (history && history.totals) || [];
    const julioPessoal = (history && history.julioPessoal) || [];
    const daniPessoal = (history && history.daniPessoal) || [];

    const totalSeries = [
      { label: "Total geral", data: totals, color: "#a07b5e", align: "top" },
    ];
    const pessoalSeries = [
      { label: "Julio", data: julioPessoal, color: "#4a7ab8", align: "top" },
      { label: "Dani", data: daniPessoal, color: "#c97070", align: "bottom" },
    ];

    if (isPCWeb_() || activeTab === "historico") {
      revealHistoricoCanvases_();
      const t = sliceHistoryForViewport_(meses, totalSeries);
      const p = sliceHistoryForViewport_(meses, pessoalSeries);
      drawLineChart_("chart-historico-total", "historicoTotal", t.months, t.series);
      drawLineChart_("chart-historico-pessoal", "historicoPessoal", p.months, p.series);
      chartPending.historicoTotal = null;
      chartPending.historicoPessoal = null;
    } else {
      chartPending.historicoTotal = { months: meses, series: totalSeries };
      chartPending.historicoPessoal = { months: meses, series: pessoalSeries };
    }
  }

  function sliceHistoryForViewport_(months, series) {
    const isMobile = window.matchMedia("(max-width: 639.98px)").matches;
    if (!isMobile) return { months: months, series: series };
    return {
      months: months.slice(-6),
      series: series.map((s) => ({ ...s, data: s.data.slice(-6) })),
    };
  }

  function drawLineChart_(canvasId, chartKey, labels, series) {
    const ctx = $(canvasId).getContext("2d");
    if (charts[chartKey]) charts[chartKey].destroy();
    const lineBase = {
      tension: 0.2,
      borderWidth: 1.5,
      pointRadius: 2.5,
      pointHoverRadius: 5,
    };
    charts[chartKey] = new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: series.map((s) => ({
          ...lineBase,
          label: s.label,
          data: s.data,
          borderColor: s.color,
          backgroundColor: s.color,
          datalabels: { align: s.align, offset: 6 },
        })),
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 24 } },
        plugins: {
          legend: { display: true },
          tooltip: {
            callbacks: {
              label: (ctx) =>
                ctx.dataset.label + ": " + Money.format(ctx.parsed.y),
            },
          },
          datalabels: {
            anchor: "end",
            align: "top",
            offset: 4,
            color: (ctx) => ctx.dataset.borderColor,
            font: { size: 10, weight: 600 },
            formatter: (v) => moneyShort_(v),
          },
        },
        scales: {
          x: {
            ticks: {
              autoSkip: false,
              maxRotation: 0,
              callback: function (value, index) {
                if (index % 2 !== 0) return "";
                const label = this.getLabelForValue(value);
                const parts = String(label || "").split("/");
                return parts.length === 3 ? parts[1] + "/" + parts[2] : label;
              },
            },
          },
          y: { ticks: { callback: (v) => moneyK_(v) } },
        },
      },
      plugins: [ChartDataLabels],
    });
  }

  function moneyShort_(v) {
    if (v == null || isNaN(v)) return "";
    const abs = Math.abs(v);
    if (abs >= 1000) {
      return (v / 1000).toFixed(1).replace(".", ",") + " mil";
    }
    return Money.format(v);
  }

  document.addEventListener("DOMContentLoaded", init);
</script>
