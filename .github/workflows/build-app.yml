name: Build App (Flutter)

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build-app.yml"
  workflow_dispatch:

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test
