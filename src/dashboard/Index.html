<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>hook-finance</title>
  <?!= include_('dashboard/Stylesheet') ?>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>
  <div id="login" hidden>
    <div class="login-card">
      <h2>hook-finance</h2>
      <label for="token-input">Token</label>
      <input id="token-input" type="password" autocomplete="off" />
      <button id="token-submit" type="button">Entrar</button>
      <p id="login-error" class="error" hidden></p>
    </div>
  </div>

  <div id="dashboard" hidden>
    <nav class="primary-nav" role="navigation" aria-label="Páginas principais">
      <button type="button" class="nav-item active" data-page="consulta">📊 Consulta</button>
      <button type="button" class="nav-item" data-page="detalhe">📋 Detalhe</button>
      <button type="button" class="nav-item" data-page="lancamento">➕ Lançamento</button>
      <button type="button" class="nav-item" data-page="acerto">🤝 Acerto</button>
    </nav>

    <div id="page-consulta" class="page">
      <div class="sticky-header">
        <div class="filter-and-kpis">
          <div class="filter-group">
            <label for="filter-data">Data</label>
            <select id="filter-data" disabled><option>—</option></select>
          </div>
          <div class="kpi"><span>Total geral</span><strong id="kpi-total-geral" class="skeleton skeleton-bar lg">—</strong></div>
          <div class="kpi"><span>Total cartão</span><strong id="kpi-total-cartao" class="skeleton skeleton-bar lg">—</strong></div>
          <div class="kpi"><span>Total parcelado</span><strong id="kpi-total-parcelado" class="skeleton skeleton-bar lg">—</strong></div>
        </div>
      </div>

      <div class="tab-strip" role="tablist" aria-label="Sub-seções">
        <button type="button" class="tab-btn active" data-tab="mes" role="tab" aria-selected="true">Mês</button>
        <button type="button" class="tab-btn" data-tab="categoria" role="tab" aria-selected="false">Categoria</button>
        <button type="button" class="tab-btn" data-tab="pessoal" role="tab" aria-selected="false">Pessoal</button>
        <button type="button" class="tab-btn" data-tab="historico" role="tab" aria-selected="false">Histórico</button>
      </div>

      <section id="tab-mes" class="tab-panel" role="tabpanel">
        <div class="people">
          <div class="card person" data-person="Julio">
            <h3 class="card-header">
              <span class="card-title">Júlio</span>
              <button type="button" class="diff-toggle" data-person="Julio" aria-label="Mostrar diferença" title="Mostrar diferença">Δ</button>
            </h3>
            <div id="diff-julio" class="diff-line" hidden></div>
            <div class="scroll-x">
              <table class="origem-breakdown" id="table-julio"></table>
              <div id="skeleton-table-julio" class="skeleton-table">
                <span class="skeleton skeleton-bar"></span>
                <span class="skeleton skeleton-bar"></span>
                <span class="skeleton skeleton-bar"></span>
                <span class="skeleton skeleton-bar"></span>
              </div>
            </div>
          </div>
          <div class="card person" data-person="Dani">
            <h3 class="card-header">
              <span class="card-title">Dani</span>
              <button type="button" class="diff-toggle" data-person="Dani" aria-label="Mostrar diferença" title="Mostrar diferença">Δ</button>
            </h3>
            <div id="diff-dani" class="diff-line" hidden></div>
            <div class="scroll-x">
              <table class="origem-breakdown" id="table-dani"></table>
              <div id="skeleton-table-dani" class="skeleton-table">
                <span class="skeleton skeleton-bar"></span>
                <span class="skeleton skeleton-bar"></span>
                <span class="skeleton skeleton-bar"></span>
                <span class="skeleton skeleton-bar"></span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="tab-categoria" class="tab-panel" role="tabpanel" hidden>
        <div class="card">
          <h3>Cartão compartilhado (por categoria)</h3>
          <div class="scroll-x">
            <table id="categoria-table"></table>
            <div id="skeleton-table-categoria" class="skeleton-table">
              <span class="skeleton skeleton-bar"></span>
              <span class="skeleton skeleton-bar"></span>
              <span class="skeleton skeleton-bar"></span>
              <span class="skeleton skeleton-bar"></span>
            </div>
          </div>
        </div>
      </section>

      <section id="tab-pessoal" class="tab-panel" role="tabpanel" hidden>
        <div class="card">
          <h3>Cartão (por pessoa)</h3>
          <div class="chart-wrap">
            <canvas id="chart-rateio" hidden></canvas>
            <div id="skeleton-chart-rateio" class="skeleton skeleton-chart"></div>
          </div>
        </div>
      </section>

      <section id="tab-historico" class="tab-panel" role="tabpanel" hidden>
        <section class="card history">
          <h3>Histórico — Total geral</h3>
          <div class="chart-wrap">
            <canvas id="chart-historico-total" hidden></canvas>
            <div id="skeleton-chart-historico-total" class="skeleton skeleton-chart"></div>
            <p id="error-historico-total" class="error" hidden></p>
          </div>
        </section>
        <section class="card history">
          <h3>Histórico — Pessoal</h3>
          <div class="chart-wrap">
            <canvas id="chart-historico-pessoal" hidden></canvas>
            <div id="skeleton-chart-historico-pessoal" class="skeleton skeleton-chart"></div>
            <p id="error-historico-pessoal" class="error" hidden></p>
          </div>
        </section>
      </section>
    </div>

    <div id="page-detalhe" class="page" hidden>
      <div class="sticky-header">
        <div class="filter-only">
          <label for="filter-data-detalhe">Data</label>
          <select id="filter-data-detalhe" disabled><option>—</option></select>
        </div>
      </div>
      <div id="detalhe-list" class="detalhe-list">
        <div class="skeleton skeleton-bar lg" style="height:3rem;margin-bottom:0.5rem"></div>
        <div class="skeleton skeleton-bar lg" style="height:3rem;margin-bottom:0.5rem"></div>
        <div class="skeleton skeleton-bar lg" style="height:3rem"></div>
      </div>
    </div>

    <div id="page-lancamento" class="page" hidden>
      <p id="lancamento-subtitle" class="lancamento-subtitle">Mês corrente: <span id="lancamento-mes-label">—</span></p>
      <div id="lancamento-list" class="lancamento-list">
        <div class="skeleton skeleton-bar lg" style="height:3rem;margin-bottom:0.5rem"></div>
        <div class="skeleton skeleton-bar lg" style="height:3rem;margin-bottom:0.5rem"></div>
        <div class="skeleton skeleton-bar lg" style="height:3rem"></div>
      </div>
    </div>

    <div id="page-acerto" class="page" hidden>
      <div class="sticky-header">
        <div class="filter-only">
          <label for="filter-data-acerto">Data</label>
          <select id="filter-data-acerto" disabled><option>—</option></select>
        </div>
      </div>
      <div class="acerto-grid">
        <div class="card acerto-card" data-person="Julio">
          <h3 class="card-header"><span class="card-title">Júlio</span></h3>
          <div id="acerto-julio" class="acerto-content">
            <div class="skeleton skeleton-bar lg" style="height:1.4rem;margin-bottom:0.4rem"></div>
            <div class="skeleton skeleton-bar lg" style="height:1.4rem;margin-bottom:0.4rem"></div>
            <div class="skeleton skeleton-bar lg" style="height:1.4rem"></div>
          </div>
        </div>
        <div class="card acerto-card" data-person="Dani">
          <h3 class="card-header"><span class="card-title">Dani</span></h3>
          <div id="acerto-dani" class="acerto-content">
            <div class="skeleton skeleton-bar lg" style="height:1.4rem;margin-bottom:0.4rem"></div>
            <div class="skeleton skeleton-bar lg" style="height:1.4rem;margin-bottom:0.4rem"></div>
            <div class="skeleton skeleton-bar lg" style="height:1.4rem"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <datalist id="categoria-options"></datalist>

  <div id="edit-modal" class="edit-modal" hidden role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="edit-modal-header">
      <h2 id="edit-modal-title">Editar lançamento</h2>
      <button type="button" id="edit-modal-close" class="edit-modal-close" aria-label="Fechar">✕</button>
    </div>
    <form id="edit-form" class="edit-form">
      <div class="edit-field readonly-field">
        <label>Data de referência</label>
        <div id="edit-dataref" class="readonly-value">—</div>
      </div>
      <div class="edit-field readonly-field">
        <label>Origem</label>
        <div id="edit-origem" class="readonly-value">—</div>
      </div>
      <div class="edit-field">
        <label for="edit-descricao">Descrição</label>
        <input id="edit-descricao" type="text" autocomplete="off" />
      </div>
      <div class="edit-field">
        <label for="edit-valor">Valor (R$)</label>
        <input id="edit-valor" type="number" step="0.01" inputmode="decimal" />
      </div>
      <div class="edit-field">
        <label for="edit-categoria">Categoria</label>
        <input id="edit-categoria" type="text" list="categoria-options" autocomplete="off" />
      </div>
      <div class="edit-field">
        <label for="edit-rateio">Rateio</label>
        <select id="edit-rateio">
          <option value="">(vazio)</option>
          <option value="Julio">Julio</option>
          <option value="Dani">Dani</option>
          <option value="Metade">Metade (compartilhado)</option>
          <option value="Alzira">Alzira</option>
        </select>
      </div>
      <div class="edit-field">
        <label>Parcela</label>
        <div class="parcela-stepper">
          <button type="button" id="edit-parcela-down" class="parcela-btn" aria-label="Diminuir parcela">−</button>
          <span id="edit-parcela-value" class="parcela-value">1x</span>
          <button type="button" id="edit-parcela-up" class="parcela-btn" aria-label="Aumentar parcela">+</button>
          <span class="parcela-hint">Total da compra: <span id="edit-parcela-total">R$ 0,00</span></span>
        </div>
      </div>
      <p id="edit-error" class="error" hidden></p>
      <div class="edit-actions">
        <button type="button" id="edit-delete" class="btn-danger">Excluir</button>
        <button type="button" id="edit-cancel" class="btn-secondary">Cancelar</button>
        <button type="submit" id="edit-save" class="btn-primary">Salvar</button>
      </div>
    </form>
  </div>

  <?!= include_('dashboard/Script') ?>
</body>
</html>
