<style>
  :root {
    --gap: 0.75rem;
    --pad: 0.75rem;
    --bg: #faf8f5;
    --fg: #262626;
    --muted: #6b6b6b;
    --border: #e2dfd9;
    --accent: #f4d35e;
    --accent-fg: #2a1f00;
    --positive: #5a7d3a;
    --negative: #b54545;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--fg);
    background: var(--bg);
    padding: var(--pad);
  }
  #dashboard {
    max-width: none;
    margin: 0;
  }
  .page {
    padding-bottom: 4rem; /* espaço pro bottom nav fixo no mobile */
  }
  .tab-panel[hidden] { display: none !important; }
  h2, h3 { margin: 0 0 0.5rem; }
  h3 {
    background: var(--accent);
    color: var(--accent-fg);
    text-align: center;
    padding: 0.35rem 0.6rem;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    margin: -0.25rem -0.25rem 0.6rem;
  }

  /* Primary nav — Consulta / Detalhe / Lançamento */
  .primary-nav {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    background: #262626;
    border-radius: 0;
    overflow: hidden;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 50;
    border-top: 1px solid #3a3a3a;
  }
  .nav-item {
    background: transparent;
    color: white;
    border: none;
    border-radius: 0;
    padding: 0.7rem 0.4rem;
    font-size: 0.85rem;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
  }
  .nav-item.active {
    background: var(--accent);
    color: var(--accent-fg);
  }
  .nav-item.disabled,
  .nav-item:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Skeleton */
  @keyframes shimmer {
    0%   { background-position: -480px 0; }
    100% { background-position:  480px 0; }
  }
  .skeleton {
    background: linear-gradient(
      90deg,
      #ece8df 0px,
      #f5f1e8 240px,
      #ece8df 480px
    );
    background-size: 960px 100%;
    animation: shimmer 1.4s linear infinite;
    border-radius: 4px;
    color: transparent !important;
    pointer-events: none;
    user-select: none;
  }
  .skeleton-bar    { display: block; height: 0.95rem; margin: 0.4rem 0; }
  .skeleton-bar.lg { height: 1.6rem; }
  .skeleton-chart  { width: 100%; height: 100%; border-radius: 6px; }
  .skeleton-table  { display: grid; gap: 0.5rem; padding: 0.4rem 0; }

  /* Login */
  #login {
    display: grid;
    place-items: center;
    min-height: 70vh;
  }
  .login-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    width: min(360px, 100%);
    display: grid;
    gap: 0.6rem;
  }
  .login-card label { font-size: 0.85rem; color: var(--muted); }
  .login-card .error { color: var(--negative); margin: 0; font-size: 0.9rem; }

  /* Sticky header (mobile: combined card; tablet+: 4-col grid) */
  .sticky-header {
    position: sticky;
    top: -1px; /* esconde 1px de borda quando sticky */
    background: var(--bg);
    z-index: 20;
    padding: 0.4rem 0;
    margin-bottom: var(--gap);
  }
  .filter-and-kpis {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.4rem;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem;
  }
  .filter-and-kpis .filter-group {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.4rem;
    margin-bottom: 0.2rem;
  }
  .filter-and-kpis .filter-group label {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .filter-and-kpis .filter-group select {
    font-size: 0.85rem;
    padding: 0.35rem 0.5rem;
  }
  .kpi {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    text-align: center;
    padding: 0.2rem;
    background: transparent;
    border: none;
    border-radius: 0;
  }
  .filter-and-kpis .kpi:not(:last-child) {
    border-right: 1px solid var(--border);
  }
  .kpi span {
    font-size: 0.65rem;
    color: var(--muted);
  }
  .kpi strong {
    font-size: 0.9rem;
    font-variant-numeric: tabular-nums;
  }

  /* Sub-tabs (Mês / Categoria / Pessoal / Histórico) */
  .tab-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 3px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: var(--gap);
  }
  .tab-btn {
    background: transparent;
    color: var(--muted);
    border: none;
    border-radius: 6px;
    padding: 0.5rem 0.3rem;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
  }
  .tab-btn.active {
    background: var(--accent);
    color: var(--accent-fg);
  }

  /* Cards / sections */
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: var(--pad);
  }
  .people, .lower {
    display: grid;
    gap: var(--gap);
    margin-bottom: var(--gap);
  }
  .history { margin-bottom: var(--gap); }

  /* Tables */
  .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
    font-size: 0.78rem;
  }
  th, td {
    padding: 0.4rem 0.55rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th { font-weight: 600; color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.03em; }
  td.num, th.num { text-align: right; }
  tr.total td { font-weight: 700; border-top: 2px solid var(--fg); border-bottom: none; }

  /* Person card layout: KPIs colados no rodapé */
  .card.person {
    display: flex;
    flex-direction: column;
  }
  .card.person .scroll-x {
    flex: 1 1 auto;
  }
  .person-kpis {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.4rem;
    margin-top: auto;
    padding-top: 0.6rem;
  }
  .mini-kpi {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.5rem;
    text-align: center;
  }
  .mini-kpi small {
    display: block;
    font-size: 0.6rem;
    color: var(--muted);
    margin-bottom: 0.15rem;
  }
  .mini-kpi b {
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  .mini-kpi.diff-pos b { color: #2c5aa0; }
  .mini-kpi.diff-neg b { color: var(--negative); }

  /* Charts */
  .chart-wrap {
    position: relative;
    height: 280px;
  }
  .chart-wrap > .skeleton-chart,
  .chart-wrap > canvas {
    position: absolute;
    inset: 0;
  }
  .chart-wrap > .error {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    margin: 0;
    color: var(--negative);
    font-size: 0.9rem;
    text-align: center;
    padding: 0.5rem;
  }
  .history .chart-wrap {
    height: 320px;
  }
  select:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* Inputs touch-friendly (font ≥16px previne zoom no iOS) */
  select, input, button {
    font: inherit;
    font-size: 16px;
    padding: 0.55rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
    color: var(--fg);
  }
  button {
    cursor: pointer;
    background: var(--fg);
    color: white;
    border-color: var(--fg);
  }
  button:hover, button:focus { opacity: 0.9; }
  select { width: 100%; }

  /* Tablet+ (≥640px) */
  @media (min-width: 640px) {
    body {
      max-width: 880px;
      margin: 0 auto;
    }
    .page {
      padding-bottom: 0; /* sem bottom nav fixa em ≥640px */
    }
    .people { grid-template-columns: 1fr 1fr; }
    .lower { grid-template-columns: 1fr 1fr; }
    .chart-wrap { height: 280px; }
    .history .chart-wrap { height: 300px; }
    .primary-nav {
      position: static;
      margin-bottom: var(--gap);
      border-radius: 8px;
      padding: 4px;
      gap: 4px;
      border-top: none;
    }
    .nav-item {
      border-radius: 6px;
      padding: 0.7rem 0.6rem;
    }
    .sticky-header {
      position: static;
      padding: 0;
    }
    .filter-and-kpis {
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap: var(--gap);
      background: transparent;
      border: none;
      padding: 0;
    }
    .filter-and-kpis .filter-group {
      grid-column: auto;
      border-bottom: none;
      padding: var(--pad);
      margin: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .filter-and-kpis .filter-group label {
      font-size: 0.8rem;
    }
    .kpi {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: var(--pad);
      text-align: left;
    }
    .filter-and-kpis .kpi:not(:last-child) {
      border-right: 1px solid var(--border);
    }
    .kpi strong {
      font-size: 1.1rem;
    }
    .kpi span {
      font-size: 0.75rem;
    }
  }

  /* PC Web (≥750px) — esconde sub-abas e mostra todos os panels juntos */
  @media (min-width: 750px) {
    .tab-strip { display: none; }
    .tab-panel,
    .tab-panel[hidden] { display: block !important; }
  }

  /* Desktop (≥1024px) — mantém max-width 880px, ajusta apenas spacing */
  @media (min-width: 1024px) {
    :root { --gap: 1rem; --pad: 1rem; }
    .kpi strong { font-size: 1.2rem; }
  }
</style>
