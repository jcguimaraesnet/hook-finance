name: Deploy Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'apps-script/**'
      - '.clasp.json'
      - '.claspignore'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-apps-script.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Write clasp credentials
        run: |
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push to Apps Script
        run: clasp push -f

      - name: Update deployment
        env:
          DEPLOYMENT_ID: AKfycby7v9mrOGHV6tIaiOmgs7ZaGolmSTXsEKIj3rYjBlYalePcuBmSM0C35Wc5-vJZRNE-7Q
        run: clasp deploy -i "$DEPLOYMENT_ID" --description "GH Action ${{ github.sha }}"
